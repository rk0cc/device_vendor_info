name: Bundle action
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bundle.yml'
      - 'bundle/**.dart'
jobs:
  unittest:
    name: Dart unit test
    env:
      working-directory: './bundle'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Get dependencies
        working-directory: ${{ env.working-directory }}
        run: dart pub get
      - name: Perform test
        working-directory: ${{ env.working-directory }}
        run: dart test